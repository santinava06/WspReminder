services:
  - type: web
    name: whatsapp-reminders-backend
    env: node
    branch: main
    root: whatsapp-reminders-backend
    buildCommand: npm install && node node_modules/puppeteer/lib/cjs/puppeteer/node/cli.js browsers install chrome
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3177
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_REMINDERS_DATA_DIR
        value: /tmp/whatsapp-reminders-data

